name: Generate Portfolio News (DCT-1)

on:
  schedule:
    # 毎月1日 午前9時 JST（= UTC 00:00）に実行
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      target_months:
        description: '対象月（例: 202602 または 202601,202602）空欄=全月'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      FUND_ID: dct1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch sheet data
        run: node scripts/fetch-sheet.js
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Classify with Claude API
        run: node scripts/classify.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Fetch OGP images
        run: node scripts/fetch-ogp.js

      - name: Generate HTML
        run: node scripts/generate-html.js
        env:
          TARGET_MONTHS: ${{ github.event.inputs.target_months }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update portfolio news"
          branch: update-news
          delete-branch: true
          title: "ニュース更新プレビュー"
          body: |
            スプレッドシートBの最新データからHTMLを生成しました。

            **確認手順:**
            1. 下の Files changed タブでHTMLの差分を確認
            2. OKならこのPRをマージ → サイトに公開されます

            対象月: ${{ github.event.inputs.target_months || '全月' }}
